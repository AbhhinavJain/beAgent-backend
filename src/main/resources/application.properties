# Database configuration (dynamic for deployment, defaults to H2 locally)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.jpa.database-platform=${SPRING_JPA_PLATFORM:org.hibernate.dialect.H2Dialect}

# Enable H2 console (optional, good for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate auto-update schema
spring.jpa.hibernate.ddl-auto=update

# Server port
server.port=8080
